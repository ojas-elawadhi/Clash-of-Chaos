<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cockroach">
  <defs>
    <radialGradient id="roachBody" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8a4a1c" />
      <stop offset="55%" stop-color="#5a2d10" />
      <stop offset="100%" stop-color="#2c1406" />
    </radialGradient>
    <linearGradient id="roachShield" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a86230" />
      <stop offset="100%" stop-color="#6b3614" />
    </linearGradient>
    <linearGradient id="roachWing" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a2208" stop-opacity="0.0" />
      <stop offset="50%" stop-color="#3a1a06" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#4a2208" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <!-- Antennae -->
  <path d="M28 14 Q20 7 12 3" stroke="#1a0a02" stroke-width="1.6" fill="none" stroke-linecap="round" />
  <path d="M36 14 Q44 7 52 3" stroke="#1a0a02" stroke-width="1.6" fill="none" stroke-linecap="round" />

  <!-- Six legs (jointed, three per side) -->
  <g stroke="#1a0a02" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Front legs -->
    <path d="M24 22 L 14 18 L 8 22" stroke-width="2" />
    <path d="M40 22 L 50 18 L 56 22" stroke-width="2" />
    <!-- Middle legs -->
    <path d="M22 33 L 8 33 L 3 38" stroke-width="2.2" />
    <path d="M42 33 L 56 33 L 61 38" stroke-width="2.2" />
    <!-- Rear legs (longest) -->
    <path d="M24 44 L 10 50 L 6 58" stroke-width="2.4" />
    <path d="M40 44 L 54 50 L 58 58" stroke-width="2.4" />
  </g>

  <!-- Abdomen / wing case -->
  <ellipse cx="32" cy="40" rx="14" ry="20" fill="url(#roachBody)" />

  <!-- Wing seam down the center -->
  <path d="M32 24 L 32 58" stroke="#150801" stroke-width="0.9" stroke-linecap="round" />

  <!-- Subtle wing veins -->
  <path d="M28 30 Q22 40 26 54" stroke="url(#roachWing)" stroke-width="0.8" fill="none" />
  <path d="M36 30 Q42 40 38 54" stroke="url(#roachWing)" stroke-width="0.8" fill="none" />

  <!-- Pronotum (shield behind the head) -->
  <ellipse cx="32" cy="22" rx="11" ry="7" fill="url(#roachShield)" />
  <ellipse cx="32" cy="20" rx="6.5" ry="2.4" fill="#b87238" opacity="0.7" />
  <path d="M32 16 L 32 28" stroke="#3d1c07" stroke-width="0.6" opacity="0.6" />

  <!-- Head -->
  <ellipse cx="32" cy="14" rx="5" ry="4" fill="#1a0a02" />

  <!-- Eyes -->
  <circle cx="29.5" cy="13.5" r="0.9" fill="#f4d8a8" />
  <circle cx="34.5" cy="13.5" r="0.9" fill="#f4d8a8" />

  <!-- Highlight on body -->
  <ellipse cx="28" cy="32" rx="2.4" ry="6" fill="#a05a26" opacity="0.35" />
</svg>
